name: Build & Release

on:
  push:
    tags:
      - 'v*'   # spustí sa len keď pushneš tag ako v1.0.1

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build Windows
        run: flutter build windows --release

      - name: ZIP build
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath app.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}